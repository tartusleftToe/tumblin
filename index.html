<!DOCTYPE html>
<html>
<head>
<title>Tumblin</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* top bar */

.topbar{
background:#181818;
padding:12px 20px;
display:flex;
align-items:center;
}

.logo{
font-size:26px;
font-weight:bold;
margin-right:30px;
}

.search input{
width:450px;
padding:8px;
background:#121212;
border:1px solid #333;
border-radius:6px;
color:white;
}

/* layout */

.container{
display:flex;
}

.sidebar{
width:220px;
background:#111;
height:100vh;
padding:20px;
}

.sidebar div{
margin-bottom:20px;
color:#ccc;
cursor:pointer;
}

.sidebar div:hover{
color:white;
}

/* videos */

.main{
flex:1;
padding:30px;
}

.videos{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.video{
cursor:pointer;
}

.thumbnail{
width:100%;
height:170px;
border-radius:10px;
object-fit:cover;
}

.title{
margin-top:8px;
font-weight:bold;
}

.meta{
font-size:13px;
color:#aaa;
}

</style>
</head>

<body>

<div class="topbar">
<div class="logo">Tumblin</div>
<div class="search">
<input placeholder="Search">
</div>
</div>

<div class="container">

<div class="sidebar">
<div>Home</div>
<div>Explore</div>
<div>Following</div>
<div>Library</div>
</div>

<div class="main">

<div class="videos">

<div class="video">
<img class="thumbnail" src="https://i.ytimg.com/vi/dQw4w9WgXcQ/hqdefault.jpg">
<div class="title">First Video</div>
<div class="meta">Creator • 1.2M views</div>
</div>

<div class="video">
<img class="thumbnail" src="https://i.ytimg.com/vi/9bZkp7q19f0/hqdefault.jpg">
<div class="title">Trending Video</div>
<div class="meta">Creator • 850K views</div>
</div>

<div class="video">
<img class="thumbnail" src="https://i.ytimg.com/vi/3JZ_D3ELwOQ/hqdefault.jpg">
<div class="title">Popular Upload</div>
<div class="meta">Creator • 420K views</div>
</div>

<div class="video">
<img class="thumbnail" src="https://i.ytimg.com/vi/l482T0yNkeo/hqdefault.jpg">
<div class="title">Music Video</div>
<div class="meta">Creator • 2M views</div>
</div>

<div class="video">
<img class="thumbnail" src="https://i.ytimg.com/vi/kJQP7kiw5Fk/hqdefault.jpg">
<div class="title">Viral Clip</div>
<div class="meta">Creator • 3.5M views</div>
</div>

<div class="video">
<img class="thumbnail" src="https://i.ytimg.com/vi/JGwWNGJdvx8/hqdefault.jpg">
<div class="title">Top Video</div>
<div class="meta">Creator • 900K views</div>
</div>

</div>

</div>

</div>

</body>
</html>
