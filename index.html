<!DOCTYPE html>
<html>
<head>
<title>Tumblin</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* sidebar */

.sidebar{
position:fixed;
left:0;
top:0;
width:200px;
height:100%;
background:#111;
padding:20px;
}

.sidebar h2{
margin-top:0;
}

.sidebar div{
margin:15px 0;
color:#ccc;
cursor:pointer;
}

.sidebar div:hover{
color:white;
}

/* main */

.main{
margin-left:220px;
padding:20px;
}

/* banner */

.banner{
background:#e5e5e5;
color:black;
font-size:50px;
font-weight:bold;
padding:30px;
text-align:center;
}

/* channel */

.channel{
display:flex;
align-items:center;
margin-top:20px;
}

.avatar{
width:80px;
height:80px;
border-radius:50%;
background:#888;
margin-right:15px;
}

.live{
background:red;
padding:4px 8px;
font-size:12px;
border-radius:6px;
margin-left:10px;
}

/* videos */

.videos{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:25px;
}

.video img{
width:100%;
border-radius:10px;
}

.title{
font-weight:bold;
margin-top:5px;
}

.meta{
font-size:13px;
color:#aaa;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Tumblin</h2>

<div>Home</div>
<div>Inbox</div>
<div>Explore</div>
<div>Following</div>

</div>

<div class="main">

<div class="banner">Tumblin</div>

<div class="channel">
<div class="avatar"></div>
<div>
<h3>Channel Name</h3>
<div>0 followers • 0 posts</div>
</div>
<div class="live">LIVE</div>
</div>

<div class="videos">

<div class="video">
<img src="https://i.ytimg.com/vi/dQw4w9WgXcQ/hqdefault.jpg">
<div class="title">ADMIN ABUSE IN MY GAME</div>
<div class="meta">9K viewers</div>
</div>

<div class="video">
<img src="https://i.ytimg.com/vi/9bZkp7q19f0/hqdefault.jpg">
<div class="title">STEAL A BRAINROT NEW UPDATE</div>
<div class="meta">401K views • 1h ago</div>
</div>

<div class="video">
<img src="https://i.ytimg.com/vi/3JZ_D3ELwOQ/hqdefault.jpg">
<div class="title">TRADING UNTIL I GET A DOMINUS</div>
<div class="meta">162K views • 18h ago</div>
</div>

</div>

</div>

</body>
</html>
